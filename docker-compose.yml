version: '3.8'

services:
  app:
    build: .
    # Docker's built-in init (tini) becomes PID 1 and reaps orphaned children.
    # Without this the gateway becomes PID 1 itself but doesn't waitpid() on
    # grandchildren re-parented to it (e.g. when bash exits in a Shell-tab PTY
    # and leaves a claude process behind), which accumulates zombies.
    init: true
    ports:
      - "${PORT:-80}:80"
    volumes:
      # User project folders — persisted on host
      - ${DATA_DIR:-./data}/users:/data/users
      # DB, logs — persisted on host
      - ${DATA_DIR:-./data}/db:/var/lib/multiuser-ccui
      # Global Claude Code settings — edit on host to configure local LLM
      - ${DATA_DIR:-./data}/claude-config:/etc/claude
      # Global Claude Code UI plugins — shared across all users
      - ${DATA_DIR:-./data}/claude-code-ui-config:/etc/claude-code-ui
      # ── CUDA Toolkit (read-only, host mount) ────────────────────────────────
      # All language servers and Qt5 are installed inside the image (Dockerfile).
      # Only CUDA is mounted from the host because it is too large (~3-5 GB) to
      # bake into the image.  Comment out if the host has no CUDA installation.
      - /usr/local/cuda:/usr/local/cuda:ro
    environment:
      # Initial admin password (change after first login)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # JWT signing secret — CHANGE THIS in production
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-long-random-string}
      # Local LLM endpoint (Ollama / vLLM / llama.cpp OpenAI-compatible API)
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://host.docker.internal:11434/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-local}
      # Session idle timeout in minutes (default 30)
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      # Max concurrent user sessions (0 = unlimited)
      MAX_SESSIONS: ${MAX_SESSIONS:-0}
      # Git proxy — HTTP(S) proxy for git remote operations
      # Set to e.g. http://host.docker.internal:34219 to use a local proxy
      GIT_PROXY_URL: ${GIT_PROXY_URL:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
      # Disable git SSL certificate verification (set to "true" or "1" to enable)
      GIT_SSL_NO_VERIFY: ${GIT_SSL_NO_VERIFY:-false}
      # NVIDIA — expose all GPUs; override via .env if needed
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    restart: unless-stopped
    # NVIDIA GPU access — requires nvidia-container-toolkit on the host:
    #   sudo apt install nvidia-container-toolkit
    #   sudo nvidia-ctk runtime configure --runtime=docker
    #   sudo systemctl restart docker
    # Comment out this line if the host has no GPU.
    runtime: nvidia
    # Needed to spawn processes with different UIDs for user isolation
    cap_add:
      - SETUID
      - SETGID
    extra_hosts:
      # Allows container to reach Ollama/LLM running on the host
      - "host.docker.internal:host-gateway"
