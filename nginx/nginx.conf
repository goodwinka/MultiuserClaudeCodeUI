server {
    listen 80 default_server;
    server_name _;

    # Large buffers for WebSocket + SSE
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # All traffic → Gateway on port 4000
    location / {
        proxy_pass http://127.0.0.1:4000;

        proxy_http_version 1.1;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable response buffering so chat SSE / streaming responses are
        # flushed to the browser token-by-token.  With the default
        # proxy_buffering on, nginx waits for a 64 KB buffer or the response
        # to end before sending anything, which makes the AI reply appear
        # all at once instead of streaming.  The gateway already rewrites
        # HTML/JS responses in-memory, so nginx doesn't need its own buffer.
        proxy_buffering off;
        proxy_request_buffering off;
        # Flush chunk-aligned to the client without coalescing
        chunked_transfer_encoding on;

        # Long timeouts for streaming / terminal sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }
}

# Connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
